services:
  documcp:
    image: documcp:local
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml
      - documcp_data:/app/data
      # Uncomment to skip device code flows by mounting existing CLI credentials:
      # - ~/.azure:/home/documcp/.azure:ro
      # - ~/.config/gh:/home/documcp/.config/gh:ro
    restart: unless-stopped
    environment:
      - DOCUMCP_CONFIG=/app/config.yaml
      - DOCUMCP_MODEL_PATH=/app/models/all-MiniLM-L6-v2
      # REQUIRED for persistent encrypted token storage across restarts.
      # Generate with: openssl rand -hex 32 and set in .env file.
      # If unset, a random key is generated per-run and stored tokens are lost on restart.
      - DOCUMCP_SECRET_KEY=${DOCUMCP_SECRET_KEY}
      # Optional: bearer token required on /api/* and /mcp/* endpoints.
      # If empty, those endpoints are open (warns at startup).
      - DOCUMCP_API_KEY=${DOCUMCP_API_KEY:-}

volumes:
  documcp_data:
